name: Merge RSS Feeds

on:
  schedule:
    - cron: '0 * * * *'   # runs every hour on the hour (UTC)
  workflow_dispatch:        # also lets you trigger it manually from GitHub UI

permissions:
  contents: write

jobs:
  merge:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run feed merger
        run: python merge_feeds.py

      - name: Commit and push updated feed
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add docs/feed.xml
          git diff --staged --quiet || git commit -m "Update network feed $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
